spring.application.name=Bikemmerce
# MONGO DB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=bikemmerce_db1
# KAFKA
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.bikemmerce.commerce.*

# Garantiza que todos los brokers de réplica confirmen el mensaje antes de responder
spring.kafka.producer.acks=all
# Habilita la idempotencia en el productor para evitar duplicados en reintentos
spring.kafka.producer.properties.enable.idempotence=true
# Número de reintentos en caso de fallos de red
spring.kafka.producer.retries=10
