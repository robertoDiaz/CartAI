spring.application.name=CartAI
# =====================================================================
# MONGODB
# =====================================================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=cartai_db
# =====================================================================
# KAFKA
# =====================================================================
#Consumer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=cart.ai.*
#Producer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=10
# =====================================================================
# MINIO (S3 STORAGE)
# =====================================================================
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=cartai-storage
minio.temp-bucket-name=cartai-storage-temp
minio.region=us-east-1
# =====================================================================
# CORS CONFIGURATION
# =====================================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
# =====================================================================
# SECURITY
# =====================================================================
cartai.security.jwt.expiration=3600000
app.security.blacklist.provider=inmemory
# =====================================================================
# REDIS (OPTIONAL - FOR PRODUCTION TOKEN BLACKLIST)
# =====================================================================
# To enable the distributed Redis token blacklist:
# 1. Uncomment the lines below.
# 2. Change 'app.security.blacklist.provider' from 'inmemory' to 'redis'.
# 3. Ensure a Redis instance is running.
#
# Environment variables can be configured:
# - In Docker Compose: under the 'environment' section or via a '.env' file.
# - In IDEs (IntelliJ/VS Code): within Run/Debug Configuration -> Environment variables.
# - In Production/Cloud: via ConfigMaps, Secrets, or platform container settings.
#
# app.security.blacklist.provider=redis
# spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
# spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
# spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
# spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

# =====================================================================
# APP SETTINGS
# =====================================================================
cartai.settings.languages=es_ES,en_US

