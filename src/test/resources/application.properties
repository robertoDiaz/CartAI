# =====================================================================
# TEST CONFIGURATION
# Overrides main application.properties for the test context.
# =====================================================================
# Embedded MongoDB is auto-configured by flapdoodle when the dependency is on the classpath.
# The version must match a real MongoDB release supported by flapdoodle.
de.flapdoodle.mongodb.embedded.version=7.0.2
# =====================================================================
# KAFKA — disable auto-startup to avoid connecting to a real broker
# =====================================================================
spring.kafka.bootstrap-servers=localhost:29092
# =====================================================================
# SPRING — disable auto-startup
# =====================================================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
app.security.blacklist.provider=inmemory
# =====================================================================
# JWT
# =====================================================================
cartai.security.jwt.secret=test-secret-key-must-be-long-enough-for-hmac-sha-algorithm
cartai.security.jwt.expiration=3600000
# =====================================================================
# BOOTSTRAP — seed roles and default users for integration tests
# =====================================================================
cartai.bootstrap.enabled=true
cartai.bootstrap.user.admin.name=Test Admin
cartai.bootstrap.user.admin.email=admin@test.com
cartai.bootstrap.user.admin.password=adminpass
cartai.bootstrap.user.vendor.name=Test Vendor
cartai.bootstrap.user.vendor.email=vendor@test.com
cartai.bootstrap.user.vendor.password=vendorpass
cartai.bootstrap.user.customer.name=Test Customer
cartai.bootstrap.user.customer.email=customer@test.com
cartai.bootstrap.user.customer.password=customerpass
# =====================================================================
# MINIO — disabled via mock beans in test config class
# =====================================================================
minio.endpoint=http://localhost:9999
minio.access-key=test
minio.secret-key=testtest
minio.bucket-name=test-bucket
minio.temp-bucket-name=test-temp-bucket
minio.region=us-east-1
# =====================================================================
# CORS
# =====================================================================
app.cors.allowed-origins=http://localhost:5174
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
cartai.mongo.transaction.enabled=false

cartai.settings.languages=es_ES,en_US
